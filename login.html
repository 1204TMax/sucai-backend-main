<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 工作流后台</title>
  <link rel="stylesheet" href="共享样式/backend.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="page-title">量化投放系统后台</div>
      <label class="field">
        <span class="label">账号</span>
        <input class="input" value="admin" autocomplete="username">
      </label>
      <label class="field">
        <span class="label">密码</span>
        <input class="input" type="password" value="123456" autocomplete="current-password">
      </label>
      <button class="btn primary" style="width:100%;margin-top:16px" onclick="location.href='index.html'">登录</button>
    </section>
  </main>
</body>
</html>
