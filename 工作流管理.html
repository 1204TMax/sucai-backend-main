<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作流管理</title>
  <link rel="stylesheet" href="共享样式/backend.css">
</head>
<body>
  <section class="panel">
    <div class="panel-header">
      <div>
        <div class="page-title">工作流管理</div>
      </div>
      <button class="btn primary" onclick="openNodeModal('new')">新建节点</button>
    </div>
    <div class="toolbar">
      <input id="keyword" class="input" placeholder="搜索节点名称 / 描述" oninput="renderTable()">
      <select id="typeFilter" class="select" onchange="renderTable()">
        <option value="">全部类型</option>
        <option>图片处理</option>
        <option>视频生成</option>
        <option>文案处理</option>
        <option>素材合成</option>
      </select>
      <select id="statusFilter" class="select" onchange="renderTable()">
        <option value="">全部状态</option>
        <option>已上线</option>
        <option>已下线</option>
      </select>
    </div>
    <table class="table">
      <thead>
        <tr>
          <th>封面</th>
          <th>名称</th>
          <th>描述</th>
          <th>节点类型</th>
          <th>状态</th>
          <th>创建人</th>
          <th>最近编辑时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="nodeRows"></tbody>
    </table>
  </section>

  <div id="nodeModal" class="modal-mask">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">新建节点</div>
        <button class="btn text" onclick="closeNodeModal()">关闭</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <label class="field">
            <span class="label">节点名称</span>
            <input id="nodeName" class="input" maxlength="10" placeholder="不超过10个字">
          </label>
          <label class="field">
            <span class="label">节点类型</span>
            <select id="nodeType" class="select">
              <option>图片处理</option>
              <option>视频生成</option>
              <option>文案处理</option>
              <option>素材合成</option>
            </select>
          </label>
          <label class="field full">
            <span class="label">节点描述</span>
            <textarea id="nodeDesc" class="textarea node-desc" maxlength="50" placeholder="不超过50个字"></textarea>
          </label>
          <div class="field full">
            <span class="label">节点封面图</span>
            <div class="cover-uploader">
              <div id="coverPreview" class="cover-preview">封面</div>
              <div class="cover-meta">
                <input id="coverImageInput" type="file" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="handleCoverFile(this)">
                <button class="btn" onclick="document.getElementById('coverImageInput').click()">上传封面</button>
                <div id="coverText" class="hint">支持 PNG、JPG、WEBP，图片比例必须为 1:1</div>
                <div id="coverError" class="hint" style="display:none;color:var(--ant-error-6)"></div>
              </div>
            </div>
          </div>
          <div class="field full">
            <span class="label">ComfyUI JSON</span>
            <div class="upload-box">
              <input id="jsonFileInput" type="file" accept=".json,application/json" style="display:none" onchange="handleJsonFile(this)">
              <div class="file-uploader" onclick="document.getElementById('jsonFileInput').click()">
                <div>
                  <div id="uploadText" class="file-name">选择本地 ComfyUI 导出的 JSON 文件</div>
                  <div class="hint">仅支持 .json 文件，不超过 100M</div>
                </div>
                <button class="btn" onclick="event.stopPropagation();document.getElementById('jsonFileInput').click()">选择文件</button>
              </div>
              <div class="input-line" style="margin-top:8px">
                <button class="btn" onclick="mockUploadFail()">模拟失败</button>
              </div>
              <div id="uploadError" class="hint" style="display:none;color:var(--ant-error-6);margin-top:8px"></div>
            </div>
          </div>
          <div class="field full">
            <div class="input-line" style="justify-content:space-between">
              <span class="label">输入项</span>
              <button class="btn" onclick="addInputItem()">新增输入项</button>
            </div>
            <div id="inputItems"></div>
          </div>
          <div class="field full">
            <div class="input-line" style="justify-content:space-between">
              <span class="label">输出结果</span>
              <button class="btn" onclick="addOutputItem()">新增输出结果</button>
            </div>
            <div id="outputItems"></div>
          </div>
          <div id="formError" class="field full" style="display:none">
            <div class="upload-box" style="border-color:var(--ant-error-2);background:var(--ant-error-1);color:var(--ant-error-6)"></div>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeNodeModal()">取消</button>
        <button class="btn primary" onclick="saveNode()">保存</button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="modal-mask">
    <div class="modal" style="width:420px">
      <div class="modal-head"><div class="modal-title">确认操作</div></div>
      <div class="modal-body" id="confirmText"></div>
      <div class="modal-foot">
        <button class="btn" onclick="closeConfirm()">取消</button>
        <button class="btn danger" onclick="runConfirm()">确认</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    var comfyNodes = [
      { id: '12', title: '主参考视频', type: 'LoadVideo', inputs: [{ name: 'video', type: 'VIDEO' }], outputs: [{ name: 'video', type: 'VIDEO' }] },
      { id: '18', title: '镜头提示词', type: 'TextInput', inputs: [{ name: 'text', type: 'STRING' }], outputs: [{ name: 'text', type: 'STRING' }] },
      { id: '24', title: '视频生成器', type: 'VideoGenerator', inputs: [{ name: 'reference_video', type: 'VIDEO' }, { name: 'prompt', type: 'STRING' }], outputs: [{ name: 'result_video', type: 'VIDEO' }] },
      { id: '31', title: '最终图片', type: 'SaveImage', inputs: [{ name: 'image', type: 'IMAGE' }], outputs: [{ name: 'images', type: 'IMAGE[]' }] }
    ]
    var nodes = [
      { id: 1, name: '爆款扩写', desc: '基于爆款素材生成多组提示词', type: '文案处理', cover: '', status: '已上线', creator: '张强', updated: '2026-05-10 10:24', inputs: [{ nodeId: '18', field: 'text', rawType: 'STRING', productType: '文本', label: '爆款文案', desc: '输入爆款原文' }], outputs: [{ nodeId: '18', field: 'text', rawType: 'STRING', productType: '文本', label: '文案结果', desc: '扩写后的文案内容' }] },
      { id: 2, name: '图生短片', desc: '输入图片生成高质量短视频素材', type: '视频生成', cover: '', status: '已下线', creator: '李娜', updated: '2026-05-09 18:12', inputs: [{ nodeId: '12', field: 'video', rawType: 'VIDEO', productType: '视频', label: '参考视频', desc: '主参考视频' }, { nodeId: '24', field: 'prompt', rawType: 'STRING', productType: '文本', label: '镜头描述', desc: '生成视频的文字描述' }], outputs: [{ nodeId: '24', field: 'result_video', rawType: 'VIDEO', productType: '视频', label: '成片视频', desc: '生成后的短视频' }, { nodeId: '18', field: 'text', rawType: 'STRING', productType: '文本', label: '提示词', desc: '生成时使用的提示词' }] },
      { id: 3, name: '素材合成', desc: '组合多张素材并输出商品主图', type: '素材合成', cover: '', status: '已上线', creator: '王磊', updated: '2026-05-08 15:40', inputs: [{ nodeId: '31', field: 'image', rawType: 'IMAGE', productType: '图片', label: '商品图', desc: '待合成商品图' }], outputs: [{ nodeId: '31', field: 'images', rawType: 'IMAGE[]', productType: '图片', label: '商品主图', desc: '合成后的商品主图' }] }
    ]
    var editingId = null
    var confirmAction = null
    var uploadParsed = false
    var currentCover = ''
    var draggingItem = null

    function renderTable() {
      var keyword = document.getElementById('keyword').value.trim()
      var type = document.getElementById('typeFilter').value
      var status = document.getElementById('statusFilter').value
      var rows = nodes.filter(function (node) {
        return (!keyword || node.name.includes(keyword) || node.desc.includes(keyword)) &&
          (!type || node.type === type) &&
          (!status || node.status === status)
      }).map(function (node) {
        var stateClass = node.status === '已上线' ? 'online' : 'offline'
        var toggle = node.status === '已上线' ? '下线' : '上线'
        return '<tr>' +
          '<td>' + coverHtml(node) + '</td>' +
          '<td><strong>' + node.name + '</strong></td>' +
          '<td>' + node.desc + '</td>' +
          '<td>' + node.type + '</td>' +
          '<td><span class="tag ' + stateClass + '">' + node.status + '</span></td>' +
          '<td>' + node.creator + '</td>' +
          '<td>' + node.updated + '</td>' +
          '<td class="table-actions"><button class="btn text" onclick="openNodeModal(&quot;edit&quot;,' + node.id + ')">编辑</button><button class="btn text" onclick="toggleNode(' + node.id + ')">' + toggle + '</button><button class="btn text danger" onclick="confirmDelete(' + node.id + ')">删除</button></td>' +
        '</tr>'
      }).join('')
      document.getElementById('nodeRows').innerHTML = rows || '<tr><td colspan="8" class="hint">暂无数据</td></tr>'
    }

    function coverHtml(node) {
      if (node.cover) return '<img class="cover-thumb" src="' + node.cover + '" alt="' + node.name + '封面">'
      return '<div class="cover-thumb cover-empty">' + node.name.slice(0, 1) + '</div>'
    }

    function getNodeOutputs(node) {
      if (node.outputs && node.outputs.length) return node.outputs
      return node.output ? [node.output] : []
    }

    function openNodeModal(mode, id) {
      editingId = mode === 'edit' ? id : null
      document.getElementById('modalTitle').textContent = editingId ? '编辑节点' : '新建节点'
      clearFormError()
      var node = nodes.find(function (item) { return item.id === id }) || { name: '', desc: '', type: '图片处理', cover: '', inputs: [{ nodeId: '12', field: 'video', label: '参考视频', desc: '' }], outputs: [{ nodeId: '24', field: 'result_video', label: '成片视频', desc: '' }] }
      document.getElementById('nodeName').value = node.name
      document.getElementById('nodeDesc').value = node.desc
      document.getElementById('nodeType').value = node.type
      currentCover = node.cover || ''
      document.getElementById('coverImageInput').value = ''
      renderCoverPreview()
      document.getElementById('uploadText').textContent = editingId ? '已解析：workflow.json' : '选择本地 ComfyUI 导出的 JSON 文件'
      setUploadError('')
      uploadParsed = !!editingId
      renderInputItems(node.inputs)
      renderOutputItems(getNodeOutputs(node))
      document.getElementById('nodeModal').classList.add('show')
    }

    function closeNodeModal() { document.getElementById('nodeModal').classList.remove('show') }

    function nodeOptionHtml(selectedId) {
      return comfyNodes.map(function (node) {
        var selected = node.id === selectedId ? ' selected' : ''
        return '<option value="' + node.id + '"' + selected + '>#' + node.id + ' ' + node.title + ' · ' + node.type + '</option>'
      }).join('')
    }

    function normalizeType(rawType) {
      if (!rawType) return '文件'
      if (rawType.indexOf('STRING') >= 0 || rawType.indexOf('TEXT') >= 0) return '文本'
      if (rawType.indexOf('IMAGE') >= 0) return '图片'
      if (rawType.indexOf('VIDEO') >= 0) return '视频'
      return '文件'
    }

    function findField(nodeId, direction, fieldName) {
      var node = comfyNodes.find(function (item) { return item.id === nodeId }) || comfyNodes[0]
      return (node[direction] || []).find(function (field) { return field.name === fieldName }) || (node[direction] || [])[0] || { name: '', type: '' }
    }

    function fieldOptionHtml(nodeId, direction, selectedField) {
      var node = comfyNodes.find(function (item) { return item.id === nodeId }) || comfyNodes[0]
      return node[direction].map(function (field) {
        var selected = field.name === selectedField ? ' selected' : ''
        return '<option value="' + field.name + '"' + selected + '>' + field.name + ' / ' + field.type + '</option>'
      }).join('')
    }

    function renderInputItems(inputs) {
      document.getElementById('inputItems').innerHTML = inputs.map(function (item, index) {
        return inputItemHtml(index, item)
      }).join('')
      updateSortableIndexes()
    }

    function inputItemHtml(index, item) {
      var nodeId = item.nodeId || comfyNodes[0].id
      var field = item.field || comfyNodes[0].inputs[0].name
      var label = item.label || '新增输入'
      var desc = item.desc || ''
      return '<div class="input-item sortable-item" ondragover="handleSortDragOver(event)" ondrop="handleSortDrop(event)">' +
        '<div class="item-head"><span class="item-index"></span><button class="sort-handle" type="button" draggable="true" ondragstart="handleSortDragStart(event)" ondragend="handleSortDragEnd(event)" title="拖拽排序" aria-label="拖拽排序"></button></div>' +
        '<div class="form-grid">' +
        '<label class="field"><span class="label">ComfyUI 节点</span><select class="select input-node" onchange="refreshInputFields(this)">' + nodeOptionHtml(nodeId) + '</select></label>' +
        '<label class="field"><span class="label">输入字段</span><select class="select input-field">' + fieldOptionHtml(nodeId, 'inputs', field) + '</select></label>' +
        '<label class="field"><span class="label">展示名称</span><input class="input input-name" maxlength="10" value="' + label + '"></label>' +
        '<label class="field"><span class="label">描述</span><input class="input input-desc" maxlength="50" value="' + desc + '"></label>' +
        '<div class="field full input-line" style="justify-content:flex-end"><button class="btn text danger" onclick="removeInputItem(this)">删除输入项</button></div>' +
        '</div>' +
      '</div>'
    }

    function addInputItem() {
      document.getElementById('inputItems').insertAdjacentHTML('beforeend', inputItemHtml(Date.now(), { nodeId: '12', field: 'video', label: '新增输入', desc: '' }))
      updateSortableIndexes()
    }

    function refreshInputFields(select) {
      var wrapper = select.closest('.input-item')
      var fieldSelect = wrapper.querySelector('.input-field')
      fieldSelect.innerHTML = fieldOptionHtml(select.value, 'inputs', '')
    }

    function removeInputItem(button) {
      button.closest('.input-item').remove()
      updateSortableIndexes()
    }

    function renderOutputItems(outputs) {
      document.getElementById('outputItems').innerHTML = outputs.map(function (item, index) {
        return outputItemHtml(index, item)
      }).join('')
      Array.from(document.querySelectorAll('.output-item')).forEach(function (item) {
        refreshOutputType(item.querySelector('.output-field'))
      })
      updateSortableIndexes()
    }

    function outputItemHtml(index, item) {
      var nodeId = item.nodeId || '24'
      var field = item.field || findField(nodeId, 'outputs', '').name
      var label = item.label || '新增输出'
      var desc = item.desc || ''
      return '<div class="input-item output-item sortable-item" ondragover="handleSortDragOver(event)" ondrop="handleSortDrop(event)">' +
        '<div class="item-head"><span class="item-index"></span><button class="sort-handle" type="button" draggable="true" ondragstart="handleSortDragStart(event)" ondragend="handleSortDragEnd(event)" title="拖拽排序" aria-label="拖拽排序"></button></div>' +
        '<div class="form-grid">' +
        '<label class="field"><span class="label">ComfyUI 节点</span><select class="select output-node" onchange="refreshOutputFields(this)">' + nodeOptionHtml(nodeId) + '</select></label>' +
        '<label class="field"><span class="label">输出字段</span><select class="select output-field" onchange="refreshOutputType(this)">' + fieldOptionHtml(nodeId, 'outputs', field) + '</select></label>' +
        '<label class="field"><span class="label">输出类型</span><input class="input output-product-type" readonly></label>' +
        '<label class="field"><span class="label">输出展示名称</span><input class="input output-label" maxlength="10" value="' + label + '" placeholder="例如：成片视频"></label>' +
        '<label class="field full"><span class="label">描述</span><input class="input output-desc" maxlength="50" value="' + desc + '" placeholder="说明该输出结果用途"></label>' +
        '<div class="field full input-line" style="justify-content:flex-end"><button class="btn text danger" onclick="removeOutputItem(this)">删除输出结果</button></div>' +
        '</div>' +
      '</div>'
    }

    function addOutputItem() {
      document.getElementById('outputItems').insertAdjacentHTML('beforeend', outputItemHtml(Date.now(), { nodeId: '24', field: 'result_video', label: '新增输出', desc: '' }))
      refreshOutputType(document.querySelector('#outputItems .output-item:last-child .output-field'))
      updateSortableIndexes()
    }

    function refreshOutputFields(select) {
      var wrapper = select.closest('.output-item')
      var fieldSelect = wrapper.querySelector('.output-field')
      fieldSelect.innerHTML = fieldOptionHtml(select.value, 'outputs', '')
      refreshOutputType(fieldSelect)
    }

    function refreshOutputType(select) {
      var wrapper = select.closest('.output-item')
      var nodeId = wrapper.querySelector('.output-node').value
      var fieldName = wrapper.querySelector('.output-field').value
      var field = findField(nodeId, 'outputs', fieldName)
      wrapper.querySelector('.output-product-type').value = normalizeType(field.type)
    }

    function removeOutputItem(button) {
      button.closest('.output-item').remove()
      updateSortableIndexes()
    }

    function handleSortDragStart(event) {
      draggingItem = event.target.closest('.sortable-item')
      if (!draggingItem) return
      event.dataTransfer.effectAllowed = 'move'
      event.dataTransfer.setData('text/plain', 'sort')
      draggingItem.classList.add('dragging')
    }

    function handleSortDragOver(event) {
      if (!draggingItem) return
      var target = event.currentTarget
      if (!target || target === draggingItem || target.parentElement !== draggingItem.parentElement) return
      event.preventDefault()
      event.dataTransfer.dropEffect = 'move'
      var rect = target.getBoundingClientRect()
      var shouldPlaceAfter = event.clientY > rect.top + rect.height / 2
      target.parentElement.insertBefore(draggingItem, shouldPlaceAfter ? target.nextSibling : target)
      updateSortableIndexes()
    }

    function handleSortDrop(event) {
      if (draggingItem) event.preventDefault()
      updateSortableIndexes()
    }

    function handleSortDragEnd() {
      if (draggingItem) draggingItem.classList.remove('dragging')
      draggingItem = null
      updateSortableIndexes()
    }

    function updateSortableIndexes() {
      Array.from(document.querySelectorAll('#inputItems .input-item')).forEach(function (item, index) {
        var indexNode = item.querySelector('.item-index')
        if (indexNode) indexNode.textContent = '输入项 ' + (index + 1)
      })
      Array.from(document.querySelectorAll('#outputItems .output-item')).forEach(function (item, index) {
        var indexNode = item.querySelector('.item-index')
        if (indexNode) indexNode.textContent = '输出结果 ' + (index + 1)
      })
    }

    function handleJsonFile(input) {
      clearFormError()
      var file = input.files && input.files[0]
      if (!file) return
      if (!file.name.toLowerCase().endsWith('.json')) {
        uploadParsed = false
        document.getElementById('uploadText').textContent = '上传失败'
        setUploadError('文件格式错误：仅支持上传 .json 文件。')
        input.value = ''
        return
      }
      if (file.size > 100 * 1024 * 1024) {
        uploadParsed = false
        document.getElementById('uploadText').textContent = '上传失败'
        setUploadError('文件超过 100M，请重新选择。')
        input.value = ''
        return
      }
      var reader = new FileReader()
      reader.onload = function () {
        try {
          JSON.parse(reader.result)
          mockUpload(file.name)
        } catch (error) {
          uploadParsed = false
          document.getElementById('uploadText').textContent = '上传失败'
          setUploadError('JSON 解析失败：' + error.message)
        }
      }
      reader.onerror = function () {
        uploadParsed = false
        document.getElementById('uploadText').textContent = '上传失败'
        setUploadError('上传中断：文件读取失败。')
      }
      reader.readAsText(file)
    }

    function mockUpload(fileName) {
      clearFormError()
      setUploadError('')
      var text = document.getElementById('uploadText')
      text.textContent = '解析成功：' + (fileName || 'mock-workflow.json')
      uploadParsed = true
      renderInputItems([{ nodeId: '12', field: 'video', label: '参考视频', desc: '' }])
      renderOutputItems([{ nodeId: '24', field: 'result_video', label: '成片视频', desc: '生成后的短视频' }, { nodeId: '18', field: 'text', label: '提示词', desc: '生成时使用的提示词' }])
    }

    function mockUploadFail() {
      uploadParsed = false
      document.getElementById('uploadText').textContent = '上传失败'
      setUploadError('JSON 解析失败：文件结构不符合 ComfyUI 工作流格式。')
    }

    function handleCoverFile(input) {
      var file = input.files && input.files[0]
      if (!file) return
      if (!/^image\/(png|jpeg|webp)$/.test(file.type)) {
        currentCover = ''
        renderCoverPreview('仅支持 PNG、JPG、WEBP 图片。')
        input.value = ''
        return
      }
      var reader = new FileReader()
      reader.onload = function () {
        var image = new Image()
        image.onload = function () {
          if (image.naturalWidth !== image.naturalHeight) {
            currentCover = ''
            renderCoverPreview('封面图必须为 1:1，请重新上传。')
            input.value = ''
            return
          }
          currentCover = reader.result
          renderCoverPreview()
        }
        image.onerror = function () {
          currentCover = ''
          renderCoverPreview('图片读取失败，请重新上传。')
          input.value = ''
        }
        image.src = reader.result
      }
      reader.onerror = function () {
        currentCover = ''
        renderCoverPreview('图片读取失败，请重新上传。')
        input.value = ''
      }
      reader.readAsDataURL(file)
    }

    function renderCoverPreview(errorText) {
      var preview = document.getElementById('coverPreview')
      var text = document.getElementById('coverText')
      var error = document.getElementById('coverError')
      if (currentCover) {
        preview.innerHTML = '<img src="' + currentCover + '" alt="节点封面预览">'
        text.textContent = '已上传 1:1 封面图'
      } else {
        preview.textContent = '封面'
        text.textContent = '支持 PNG、JPG、WEBP，图片比例必须为 1:1'
      }
      error.textContent = errorText || ''
      error.style.display = errorText ? 'block' : 'none'
    }

    function saveNode() {
      clearFormError()
      var name = document.getElementById('nodeName').value.trim()
      var desc = document.getElementById('nodeDesc').value.trim()
      var type = document.getElementById('nodeType').value
      var inputs = Array.from(document.querySelectorAll('.input-item')).filter(function (item) {
        return item.querySelector('.input-node')
      }).map(function (item) {
        return {
          nodeId: item.querySelector('.input-node').value,
          field: item.querySelector('.input-field').value,
          rawType: findField(item.querySelector('.input-node').value, 'inputs', item.querySelector('.input-field').value).type,
          productType: normalizeType(findField(item.querySelector('.input-node').value, 'inputs', item.querySelector('.input-field').value).type),
          label: item.querySelector('.input-name').value.trim(),
          desc: item.querySelector('.input-desc').value.trim()
        }
      })
      var outputs = Array.from(document.querySelectorAll('.output-item')).map(function (item) {
        var outputField = findField(item.querySelector('.output-node').value, 'outputs', item.querySelector('.output-field').value)
        return {
          nodeId: item.querySelector('.output-node').value,
          field: item.querySelector('.output-field').value,
          rawType: outputField.type,
          productType: normalizeType(outputField.type),
          label: item.querySelector('.output-label').value.trim(),
          desc: item.querySelector('.output-desc').value.trim()
        }
      })
      var errors = validateNodeForm(name, desc, type, inputs, outputs)
      if (errors.length) {
        showFormError(errors)
        return
      }
      if (editingId) {
        var node = nodes.find(function (item) { return item.id === editingId })
        Object.assign(node, { name: name, desc: desc, type: type, cover: currentCover, outputs: outputs, inputs: inputs, updated: '2026-05-10 现在' })
        delete node.output
      } else {
        nodes.unshift({ id: Date.now(), name: name, desc: desc, type: type, cover: currentCover, status: '已下线', creator: '当前用户', updated: '2026-05-10 现在', inputs: inputs, outputs: outputs })
      }
      closeNodeModal()
      renderTable()
    }

    function validateNodeForm(name, desc, type, inputs, outputs) {
      var errors = []
      if (!name) errors.push('节点名称不能为空。')
      if (name.length > 10) errors.push('节点名称不能超过 10 个字。')
      if (['审核', '开始', '结束'].indexOf(name) >= 0) errors.push('名称不合法，请更换。')
      if (desc.length > 50) errors.push('节点描述不能超过 50 个字。')
      if (!type) errors.push('必须选择节点类型。')
      if (!uploadParsed) errors.push('必须上传并解析 ComfyUI JSON。')
      if (!inputs.length) errors.push('至少需要配置 1 个输入项。')
      var labels = {}
      inputs.forEach(function (item, index) {
        var inputLabel = item.label || ''
        var inputDesc = item.desc || ''
        if (!item.nodeId) errors.push('第 ' + (index + 1) + ' 个输入项必须选择 ComfyUI 节点。')
        if (!item.field) errors.push('第 ' + (index + 1) + ' 个输入项必须选择输入字段。')
        if (!inputLabel) errors.push('第 ' + (index + 1) + ' 个输入项必须填写展示名称。')
        if (inputLabel.length > 10) errors.push('第 ' + (index + 1) + ' 个输入项展示名称不能超过 10 个字。')
        if (inputDesc.length > 50) errors.push('第 ' + (index + 1) + ' 个输入项描述不能超过 50 个字。')
        if (inputLabel) labels[inputLabel] = (labels[inputLabel] || 0) + 1
      })
      Object.keys(labels).forEach(function (label) {
        if (labels[label] > 1) errors.push('输入项展示名称“' + label + '”重复，不允许保存。')
      })
      if (!outputs.length) errors.push('至少需要配置 1 个输出项。')
      var outputLabels = {}
      outputs.forEach(function (item, index) {
        var outputLabel = item.label || ''
        if (!item.nodeId) errors.push('第 ' + (index + 1) + ' 个输出项必须选择 ComfyUI 节点。')
        if (!item.field) errors.push('第 ' + (index + 1) + ' 个输出项必须选择输出字段。')
        if (!outputLabel) errors.push('第 ' + (index + 1) + ' 个输出项必须填写输出展示名称。')
        if (outputLabel.length > 10) errors.push('第 ' + (index + 1) + ' 个输出项展示名称不能超过 10 个字。')
        if ((item.desc || '').length > 50) errors.push('第 ' + (index + 1) + ' 个输出项描述不能超过 50 个字。')
        if (outputLabel) outputLabels[outputLabel] = (outputLabels[outputLabel] || 0) + 1
      })
      Object.keys(outputLabels).forEach(function (label) {
        if (outputLabels[label] > 1) errors.push('输出项展示名称“' + label + '”重复，不允许保存。')
      })
      return errors
    }

    function showFormError(errors) {
      var box = document.getElementById('formError')
      box.style.display = 'flex'
      box.firstElementChild.innerHTML = errors.map(function (error) { return '<div>' + error + '</div>' }).join('')
    }

    function clearFormError() {
      var box = document.getElementById('formError')
      box.style.display = 'none'
      box.firstElementChild.innerHTML = ''
    }

    function setUploadError(text) {
      var error = document.getElementById('uploadError')
      error.textContent = text
      error.style.display = text ? 'block' : 'none'
    }

    function toggleNode(id) {
      var node = nodes.find(function (item) { return item.id === id })
      var next = node.status === '已上线' ? '下线' : '上线'
      document.getElementById('confirmText').textContent = '确认' + next + '节点“' + node.name + '”？操作后将影响后续新任务和节点库展示。'
      confirmAction = function () {
        node.status = node.status === '已上线' ? '已下线' : '已上线'
        node.updated = '2026-05-10 现在'
        renderTable()
        showToast(next + '成功')
      }
      document.getElementById('confirmModal').classList.add('show')
    }

    function confirmDelete(id) {
      var node = nodes.find(function (item) { return item.id === id })
      document.getElementById('confirmText').textContent = '确认删除节点“' + node.name + '”？已开始的任务不会受影响。'
      confirmAction = function () {
        nodes = nodes.filter(function (item) { return item.id !== id })
        renderTable()
        showToast('删除成功')
      }
      document.getElementById('confirmModal').classList.add('show')
    }

    function closeConfirm() { document.getElementById('confirmModal').classList.remove('show') }
    function runConfirm() { if (confirmAction) confirmAction(); closeConfirm() }
    function showToast(text) {
      var toast = document.getElementById('toast')
      toast.textContent = text
      toast.classList.add('show')
      setTimeout(function () { toast.classList.remove('show') }, 1800)
    }
    renderTable()
  </script>
</body>
</html>
